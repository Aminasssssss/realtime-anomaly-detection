name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run linting
        run: |
          pip install flake8
          flake8 src/ tests/ --max-line-length=120 --ignore=E203,W503 --exclude=__pycache__

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short --no-header \
            --ignore=tests/test_integration.py

      - name: Check imports
        run: |
          python -c "from src.config import WINDOW_SIZE; print('Config OK')"
          python -c "from src.features import extract_features; print('Features OK')"
          python -c "from src.data_loader import sliding_windows, normalize; print('DataLoader OK')"

  docker:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t anomaly-detection:ci .

      - name: Check image starts
        run: |
          docker run --rm anomaly-detection:ci python -c "
          from src.config import WINDOW_SIZE, SMAP_CHANNEL
          from src.features import extract_features
          import numpy as np
          w = np.random.randn(10, WINDOW_SIZE, 5)
          f = extract_features(w)
          print(f'Image OK | features shape: {f.shape}')
          "
